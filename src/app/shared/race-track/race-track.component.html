<div class="track">
  <div class="track__header">
    <span class="track__name">{{ name }}</span>
  </div>

  <div class="track__lane">
    <div class="track__road">
      <div
        class="track__car"
        [class.track__car--driving]="isDriving"
        [class.track__car--broken]="isBroken"
        [style.animation-duration.ms]="duration"
      >
        <ar-car [color]="color" />
      </div>

      <div class="track__finish" aria-label="Finish line">🏁</div>
    </div>
  </div>
</div>
